name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binaries
        run: |
          GOOS=windows GOARCH=amd64 go build -o tokenBoardCreator-windows-amd64.exe .
          GOOS=darwin  GOARCH=amd64 go build -o tokenBoardCreator-darwin-amd64 .
          GOOS=darwin  GOARCH=arm64 go build -o tokenBoardCreator-darwin-arm64 .
          GOOS=linux   GOARCH=amd64 go build -o tokenBoardCreator-linux-amd64 .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tokenBoardCreator-windows-amd64.exe
            tokenBoardCreator-darwin-amd64
            tokenBoardCreator-darwin-arm64
            tokenBoardCreator-linux-amd64
